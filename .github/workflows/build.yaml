# This is a basic workflow to help you get started with Actions

name: Build libmpv

# Controls when the workflow will run
on:
  release:
    types: [created]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip python3-jinja2 gperf nasm
          sudo pip3 install meson

      - name: Download sdk
        working-directory: ./buildscripts
        run: ./include/download-sdk.sh

      - name: Download deps
        working-directory: ./buildscripts
        run: ./include/download-deps.sh    


      - name: Build libmpv
        working-directory: ./buildscripts
        run: |
          ./buildall.sh --arch armv7l mpv
          ./buildall.sh --arch arm64 mpv
          ./buildall.sh --arch x86_64 mpv

      - name: Install zip
        uses: montudor/action-zip@v1  

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1  

      - name: Output
        run: dart run ./copy.dart

      - name: Output zip
        working-directory: ./output
        run: |
            zip -qq -r arm64-v8a.zip arm64-v8a  
            zip -qq -r armeabi-v7a.zip armeabi-v7a 
            zip -qq -r x86_64.zip x86_64

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./output/*.zip

      

