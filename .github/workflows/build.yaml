# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download sdk
        run: |
         set -e
         cd $GITHUB_WORKSPACE
         ls -la buildscripts/include/
         ls -la buildscripts/include/depinfo.sh
         bash buildscripts/include/download-sdk.sh

      - name: Download deps
        run: |
          buildscripts/include/download-deps.sh    


      - name: Build libmpv
        run: |
          buildscripts/buildall.sh --arch armv7l mpv
          buildscripts/buildall.sh --arch arm64 mpv
          buildscripts/buildall.sh --arch x86_64 mpv
